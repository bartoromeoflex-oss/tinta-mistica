


<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinta Mística</title>
    <style>
        body { background-color: #f4ecd8; font-family: 'Georgia', serif; color: #2c1e11; text-align: center; margin: 0; padding: 10px; }
        h1 { color: #8b5a2b; font-size: 32px; margin: 10px 0; }
        .pantalla { display: flex; justify-content: center; gap: 15px; max-width: 1200px; margin: 0 auto; }
        .estanteria { background: #dfcfb3; border: 5px solid #8b5a2b; border-radius: 8px; width: 90px; padding: 10px; height: 460px; overflow-y: auto; }
        .librito { background: linear-gradient(45deg, #3a539b, #22316c); color: white; padding: 12px; margin: 6px 0; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .librito:hover { transform: scale(1.05); }
        .lector { background: white; border: 6px solid #8b5a2b; border-radius: 8px; width: 620px; height: 460px; padding: 15px; text-align: left; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .descarga-box { margin-top: 15px; background: #e6dac1; border: 3px solid #8b5a2b; border-radius: 8px; padding: 12px; display: flex; gap: 10px; }
        .descarga-box input { flex: 1; padding: 12px; font-size: 16px; border: 2px solid #8b5a2b; border-radius: 5px; }
        .btn-descargar { background: #8b5a2b; color: white; padding: 12px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-descargar:hover { background: #a36e3a; }
        .anuncio { width: 160px; height: 460px; border: 3px dashed #8b5a2b; display: flex; align-items: center; justify-content: center; color: #8b5a2b; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Tinta Mística</h1>

    <div class="pantalla">
        <!-- Estantería -->
        <div class="estanteria" id="estanteria"></div>

        <!-- Lector -->
        <div class="lector" id="lector">
            <h2 id="titulo">Selecciona un número</h2>
            <div id="contenido">Haz clic en un número de la izquierda para ver las imágenes.</div>

            <!-- Área de descarga -->
            <div class="descarga-box">
                <input type="text" id="nombreImagen" placeholder="Pega aquí el nombre de la imagen">
                <button class="btn-descargar" onclick="descargarImagen()">DESCARGAR</button>
            </div>
        </div>

        <!-- Lado derecho -->
        <div>
            <div style="font-size:90px; margin-bottom:10px;">🔮</div>
            <button onclick="conocimiento()" style="width:160px; padding:12px; background:#e6dac1; border:2px solid #8b5a2b; border-radius:8px; font-weight:bold; cursor:pointer;">
                CONOCIMIENTO
            </button>
            
            <div class="anuncio" style="margin-top:15px;">
                ANUNCIO
            </div>
        </div>
    </div>

    <p style="margin-top:20px; color:#8b5a2b; font-weight:bold;">100% Seguro</p>

    <script>
        const estanteria = document.getElementById('estanteria');
        for (let i = 1; i <= 45; i++) {
            let btn = document.createElement('div');
            btn.className = 'librito';
            btn.textContent = i;
            btn.onclick = () => mostrarNumero(i);
            estanteria.appendChild(btn);
        }

        function mostrarNumero(num) {
            document.getElementById('titulo').innerHTML = `ARCHIVO ZIP NÚMERO ${num}`;
            document.getElementById('contenido').innerHTML = `
                <p>Imágenes del archivo número ${num}:</p>
                <p style="color:#666;">(Aquí se cargarán las imágenes del número ${num})</p>
            `;
        }

        function descargarImagen() {
            let nombre = document.getElementById('nombreImagen').value.trim();
            if (nombre === "") {
                alert("Por favor pega el nombre de la imagen");
                return;
            }
            alert(`Descargando: ${nombre}`);
            // Aquí iría el link real de descarga después
        }

        function conocimiento() {
            alert("🔮 Acceso al conocimiento activado");
        }
    </script>
</body>
</html>
